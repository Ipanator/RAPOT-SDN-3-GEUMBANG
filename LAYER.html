<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ujian Esai Online</title>
  <style>
    body{font-family:Arial,sans-serif;background:#f5f7fb;margin:0;padding:20px}
    .box{max-width:700px;margin:auto;background:#fff;padding:20px;border-radius:12px;box-shadow:0 4px 12px rgba(0,0,0,.1)}
    h2{text-align:center;color:#1e3a8a}
    .top{display:flex;justify-content:space-between;margin-bottom:15px;font-weight:bold}
    .progress{background:#e5e7eb;height:8px;border-radius:10px;overflow:hidden;margin:10px 0}
    .bar{height:8px;background:#2563eb;width:0}
    textarea{width:100%;min-height:160px;padding:12px;border:1px solid #d1d5db;border-radius:8px;font-size:15px}
    .btns{display:flex;justify-content:space-between;margin-top:15px}
    button{padding:10px 18px;border:none;border-radius:8px;background:#2563eb;color:#fff;cursor:pointer}
    button:disabled{background:#9ca3af;cursor:not-allowed}
  </style>
</head>
<body>
  <div class="box">
    <h2>Ujian Esai Online</h2>
    <div class="top">
      <span id="nomor">Soal 1</span>
      <span id="timer">60:00</span>
    </div>
    <div class="progress"><div class="bar" id="bar"></div></div>
    <p id="soal">Memuat soal...</p>
    <textarea id="jawaban" placeholder="Tulis jawaban di sini..."></textarea>
    <div class="btns">
      <button id="prev">Sebelumnya</button>
      <button id="next">Berikutnya</button>
      <button id="finish">Selesai</button>
    </div>
  </div>

  <script>
    let soal=[],jawaban=[],index=0,waktu=60*60;

    fetch("soal.txt")
      .then(r=>r.text())
      .then(t=>{
        soal=t.split("===").map(s=>s.trim()).filter(Boolean);
        jawaban=new Array(soal.length).fill("");
        tampil();
      });

    function tampil(){
      document.getElementById("nomor").textContent=`Soal ${index+1} dari ${soal.length}`;
      document.getElementById("soal").textContent=soal[index];
      document.getElementById("jawaban").value=jawaban[index];
      document.getElementById("bar").style.width=((index+1)/soal.length*100)+"%";
      document.getElementById("prev").disabled=index===0;
      document.getElementById("next").disabled=index===soal.length-1;
    }

    document.getElementById("jawaban").addEventListener("input",e=>{
      jawaban[index]=e.target.value;
    });

    document.getElementById("prev").onclick=()=>{if(index>0){index--;tampil();}};
    document.getElementById("next").onclick=()=>{if(index<soal.length-1){index++;tampil();}};
    document.getElementById("finish").onclick=()=>{
      alert("Jawaban tersimpan di browser. Integrasikan ke server jika ingin nilai online.");
      console.log(jawaban);
    };

    setInterval(()=>{
      if(waktu>0){
        waktu--;
        let m=Math.floor(waktu/60),s=waktu%60;
        document.getElementById("timer").textContent=
          `${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")}`;
      }
    },1000);
  </script>
</body>
</html>
