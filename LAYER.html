<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Konser Lyrics Wall</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
overflow:hidden;
background:#0f4cff;
font-family:Arial,sans-serif;
height:100vh;
}

#stage{
position:relative;
width:100%;
height:100vh;
overflow:hidden;
background:linear-gradient(
180deg,
#1d4fff,
#0e3de0
);
}

/* BUBBLE BIRU */

.bubble{
position:absolute;
padding:10px 22px;
border-radius:30px;
background:#2f67ff;
color:white;
font-size:14px;
white-space:nowrap;
opacity:.9;
animation:floatUp linear infinite;
}

/* BUBBLE PUTIH */

.whiteBubble{
position:absolute;
padding:10px 24px;
border-radius:30px;
background:white;
color:#333;
font-size:14px;
font-weight:600;
white-space:nowrap;
animation:floatUp linear infinite;
}

/* REFF BESAR */

#reffBubble{

position:absolute;
left:50%;
top:55%;

transform:translate(-50%,-50%);

background:white;
color:#1b1b1b;

padding:20px 50px;

border-radius:60px;

font-size:60px;
font-weight:bold;

opacity:0;

z-index:1000;
}

.showReff{
animation:showReff 1.2s forwards;
}

@keyframes showReff{

from{
opacity:0;
transform:translate(-50%,-50%) scale(.7);
}

to{
opacity:1;
transform:translate(-50%,-50%) scale(1);
}

}

/* TEKS MELINTANG */

#bigLyrics{

position:absolute;

top:65%;

left:100%;

font-size:80px;
font-weight:bold;

color:white;

white-space:nowrap;

opacity:0;

z-index:900;
}

.runLyrics{
animation:moveLyrics 15s linear infinite;
opacity:1 !important;
}

@keyframes moveLyrics{

from{
transform:translateX(0);
}

to{
transform:translateX(-220%);
}

}

/* BUBBLE NAIK */

@keyframes floatUp{

from{
transform:translateY(110vh);
}

to{
transform:translateY(-200px);
}

}

</style>
</head>

<body>

<div id="stage">


<div id="bigLyrics">
Cukup aku milikmu. Dan kamu milikku. Tetap di sini bersamaku.
</div>

</div>

<script>

const stage = document.getElementById("stage");

const texts = [

"aku sayang kamu",
"makasi udah dengerin aku",
"safe flight",
"aku jemput ya",
"udah makan belum?",
"semangat ya",
"aku kangen",
"cantiknyaa",
"hati hati ya",
"take care sayang",
"istirahat dulu",
"aku rindu",
"love you",
"aku disini",
"peluk jauh",
"jangan tidur malam",
"makasih ya",
"aku tunggu",
"aku bangga",
"tetap kuat"

];

/* BUBBLE BIRU */

function createBlueBubble(){

const b=document.createElement("div");

b.className="bubble";

b.innerText=
texts[Math.floor(Math.random()*texts.length)];

b.style.left=Math.random()*100+"%";

b.style.animationDuration=
(12+Math.random()*25)+"s";

b.style.fontSize=
(12+Math.random()*8)+"px";

b.style.opacity=
0.4+Math.random()*0.6;

stage.appendChild(b);

setTimeout(()=>{
b.remove();
},40000);

}

for(let i=0;i<250;i++){

setTimeout(createBlueBubble,i*150);

}

setInterval(createBlueBubble,250);

/* REFF */

setTimeout(()=>{

document
.getElementById("reffBubble")
.classList
.add("showReff");

},6000);

/* BUBBLE PUTIH */

function createWhiteBubble(){

const b=document.createElement("div");

b.className="whiteBubble";

b.innerText="Cukup aku milikmu";

b.style.left=Math.random()*100+"%";

b.style.animationDuration=
(10+Math.random()*18)+"s";

stage.appendChild(b);

setTimeout(()=>{
b.remove();
},30000);

}

setTimeout(()=>{

for(let i=0;i<70;i++){

setTimeout(createWhiteBubble,i*200);

}

setInterval(createWhiteBubble,400);

},7000);

/* TEKS REFF BESAR */

setTimeout(()=>{

document
.getElementById("bigLyrics")
.classList
.add("runLyrics");

},8500);

</script>

</body>
</html>
