<!DOCTYPE html>
<html lang="id"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Bubble Wall Template</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{overflow:hidden;height:100vh;background:linear-gradient(180deg,#1d4fff,#0e3de0);font-family:Arial}
#stage{position:relative;width:100%;height:100vh;overflow:hidden}
.bubble,.white{position:absolute;padding:10px 22px;border-radius:28px;white-space:nowrap;animation:up linear forwards}
.bubble{background:#2f67ff;color:#fff}
.white{background:#fff;color:#222;font-weight:bold;z-index:5}
#banner{position:absolute;top:50%;left:0;transform:translateY(-50%);padding:18px 40px;background:#fff;border-radius:50px;font-size:min(70px,7vw);font-weight:bold;opacity:0;white-space:nowrap}
.run{opacity:1;animation:slide var(--speed) linear forwards}
@keyframes up{from{transform:translateY(110vh)}to{transform:translateY(-220px)}}
@keyframes slide{from{transform:translate(100vw,-50%)}to{transform:translate(calc(-100% - 100vw),-50%)}}
</style></head><body><div id="stage"><div id="banner"></div></div>
<script>
const stage=stage=document.getElementById("stage"),banner=document.getElementById("banner");
const texts=["aku di sini","tetap semangat","aku percaya","kau berharga","jangan menyerah","aku menunggu","selalu ada","tetap tersenyum","kau berarti","semoga bahagia"];
const lines=["Aku tetap di sini","Aku percaya padamu","Tak ada yang berubah","Semoga kita bertemu","Aku akan bertahan","Kau selalu berarti"];
let idx=0;
function blue(){let b=document.createElement("div");b.className="bubble";b.textContent=texts[Math.random()*texts.length|0];b.style.left=(-15+Math.random()*130)+"vw";b.style.fontSize=(14+Math.random()*8)+"px";b.style.opacity=.5+Math.random()*.4;b.style.animationDuration=(20+Math.random()*12)+"s";stage.appendChild(b);setTimeout(()=>b.remove(),35000);}
for(let i=0;i<220;i++)setTimeout(blue,i*20);setInterval(blue,100);
function white(){let b=document.createElement("div");b.className="white";b.textContent=lines[idx];b.style.left=(Math.random()*100)+"vw";b.style.animationDuration=(6+Math.random()*2)+"s";stage.appendChild(b);setTimeout(()=>b.remove(),10000);}
function section(start,duration,speed){
setTimeout(()=>{
idx=0;banner.textContent=lines.join(" • ");banner.style.setProperty("--speed",speed+"s");banner.classList.add("run");
const wt=setInterval(()=>{white();idx=(idx+1)%lines.length;},140);
setTimeout(()=>{clearInterval(wt);banner.classList.remove("run");banner.style.opacity=0;},duration);
},start);}
section(30000,20000,30);
section(70000,25000,24);
section(120000,30000,20);
</script></body></html>
