<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ulang Tahun SDN 3 Gelumbang</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<style>
    * {margin:0; padding:0; box-sizing:border-box; font-family:'Poppins', sans-serif;}
    body {background: linear-gradient(135deg,#f6d365,#fda085); min-height:100vh; display:flex; justify-content:center; align-items:center; flex-direction:column; text-align:center; color:#333;}
    h1 {font-size:2.5rem; margin-bottom:10px; color:#fff; text-shadow:2px 2px 6px rgba(0,0,0,0.3);}
    h2 {font-size:1.8rem; margin-bottom:20px; color:#fff;}
    .card {background:rgba(255,255,255,0.9); padding:30px 40px; border-radius:15px; box-shadow:0 8px 25px rgba(0,0,0,0.2); max-width:400px; margin:10px auto;}
    .name {font-size:1.5rem; font-weight:600; margin-bottom:5px; color:#ff6b6b;}
    .birth {font-size:1rem; color:#555;}
    #no-birthday {color:#fff; font-size:1.5rem; margin-top:30px;}
</style>
</head>
<body>

<h1>🎉 Selamat Ulang Tahun! 🎉</h1>
<h2>SD Negeri 3 Gelumbang</h2>

<div id="birthday-container"></div>
<div id="no-birthday" style="display:none;">Tidak ada peserta yang ulang tahun hari ini.</div>

<audio id="birthday-audio" src="ulang_tahun.mp3" preload="auto"></audio>

<script>
// Ambil tanggal hari ini
const today = new Date();
const todayStr = today.toISOString().slice(5,10); // format MM-DD

// Load data ulang tahun
fetch('data_ultah.json')
.then(response => response.json())
.then(data => {
    const container = document.getElementById('birthday-container');
    let found = false;

    data.forEach(student => {
        const birthMMDD = student.birth.slice(5); // ambil MM-DD
        if(birthMMDD === todayStr){
            found = true;
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `<div class="name">${student.name}</div>
                              <div class="birth">${student.place} - ${student.birth}</div>`;
            container.appendChild(card);
        }
    });

    if(found){
        document.getElementById('birthday-audio').play();
    } else {
        document.getElementById('no-birthday').style.display = 'block';
    }
})
.catch(err => {
    console.error('Gagal memuat data ulang tahun', err);
    document.getElementById('no-birthday').style.display = 'block';
});
</script>

</body>
</html>
