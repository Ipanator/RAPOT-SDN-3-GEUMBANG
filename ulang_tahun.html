<!DOCTYPE html>

<title>Ulang Tahun SDN 3 Gelumbang</title>

<link href="https://fonts.googleapis.com/css2?family=Fira+Sans:wght@400;600&family=Nunito:wght@400;600&family=Orbitron:wght@700&display=swap" rel="stylesheet">

<style>

*{box-sizing:border-box}

body{
margin:0;
font-family:'Fira Sans',sans-serif;
min-height:100vh;
display:flex;
flex-direction:column;
align-items:center;
background:linear-gradient(135deg,#ff9a9e,#fad0c4,#fbc2eb,#a6c1ee);
background-size:400% 400%;
animation:gradientBG 20s ease infinite;
color:#fff;
overflow-x:hidden;
}

@keyframes gradientBG{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

#main-title{
font-family:'Orbitron',sans-serif;
font-size:3rem;
margin:30px 20px 10px;
text-align:center;
background:linear-gradient(90deg,#fffc00,#ff00ff,#00ffff,#ff7f50);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
text-shadow:0 0 5px #fff,0 0 10px #ff0,0 0 20px #f0f,0 0 30px #0ff;
}

#main-title span{display:block}

#age-text{

text-align:center;
max-width:900px;
}

#birthday-container{
display:grid;

}

</style>
</head>

<body>

<h1 id="main-title">
<span>Selamat Ulang Tahun</span>
<span>Peserta Didik</span>
<span>SDN 3 Gelumbang</span>
</h1>

<div id="age-text"></div>
<div id="birthday-container"></div>

<div id="doa-text">
Semoga di usia yang bertambah ini, ananda senantiasa diberi kesehatan, keberkahan, kemudahan dalam belajar, serta tumbuh menjadi generasi yang cerdas dan membanggakan.
</div>

<button id="share-btn" onclick="sharePage()">📤 Bagikan Halaman Ini</button>

<audio id="birthday-audio" loop>
<source src="hbd.mp3" type="audio/mpeg">
</audio>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script>

const audio = document.getElementById("birthday-audio");

/* trik supaya musik bisa bunyi di HP */
function startAudio(){
audio.play().catch(()=>{});
document.removeEventListener("click",startAudio);
document.removeEventListener("touchstart",startAudio);
}

document.addEventListener("click",startAudio);
document.addEventListener("touchstart",startAudio);

const today = new Date();
const todayStr = today.toISOString().slice(5,10);

fetch('data_ultah.json')
.then(res => res.json())
.then(data => {

const container = document.getElementById('birthday-container');
const ageText = document.getElementById('age-text');

const birthdayToday = data.filter(s => s.birth.slice(5) === todayStr);

if(birthdayToday.length){

audio.play().catch(()=>{});

function confettiLoop(){
confetti({particleCount:5,angle:60,spread:55,origin:{x:0}});
confetti({particleCount:5,angle:120,spread:55,origin:{x:1}});
requestAnimationFrame(confettiLoop);
}

confettiLoop();

birthdayToday.forEach(s => {

const birthDate = new Date(s.birth);
const age = today.getFullYear() - birthDate.getFullYear();

const day = today.getDate();
const month = today.toLocaleString('id-ID',{month:'long'});
const year = today.getFullYear();

ageText.innerHTML=`Hari ini, ${day} ${month} ${year} menjadi momen istimewa bagi ananda yang berulang tahun`;

const card = document.createElement('div');
card.className='card';

card.innerHTML=`
<div class="name">${s.name}</div>
<div class="age">Umur: ${age} tahun</div>
`;

container.appendChild(card);

});

}

});

function sharePage(){

if(navigator.share){

navigator.share({
title:"Ulang Tahun Peserta Didik SDN 3 Gelumbang",
text:"Lihat ucapan ulang tahun peserta didik SDN 3 Gelumbang",
url:window.location.href
});

}else{

navigator.clipboard.writeText(window.location.href);
alert("Link berhasil disalin");

}

}

</script>

</body>
</html>
