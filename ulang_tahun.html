<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ulang Tahun SDN 3 Gelumbang</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
<style>
body {
    font-family: 'Poppins', sans-serif;
    margin: 0;
    padding: 0;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(to bottom, #a0d8f1, #ffffff);
    overflow: hidden;
    flex-direction: column;
}
#cards-container {
    position: relative;
    z-index: 10;
}
.birthday-card, .no-birthday {
    background: #fff;
    border-radius: 15px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.2);
    padding: 30px;
    max-width: 400px;
    text-align: center;
    margin: 20px;
    animation: fadeIn 1s ease-in-out;
}
.birthday-card h2 { color: #ff6b81; margin-bottom: 10px; }
.no-birthday h2 { color: #3399ff; margin-bottom: 10px; }
.birthday-card p, .no-birthday p { color: #333; font-size: 18px; }

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px);}
    to { opacity: 1; transform: translateY(0);}
}

/* Animasi balon */
.balloon {
    position: absolute;
    bottom: -100px;
    width: 50px;
    height: 70px;
    background-color: #ff6b81;
    border-radius: 50% 50% 50% 50%;
    animation: floatUp linear infinite;
    opacity: 0.8;
}
@keyframes floatUp {
    0% { transform: translateY(0) rotate(0deg); }
    100% { transform: translateY(-120vh) rotate(360deg); }
}
</style>
</head>
<body>

<div id="cards-container"></div>
<audio id="birthday-song" src="music/happy_birthday.mp3" preload="auto"></audio>

<script>
// Fungsi buat balon acak
function createBalloon() {
    const balloon = document.createElement('div');
    balloon.className = 'balloon';
    balloon.style.left = Math.random() * window.innerWidth + 'px';
    balloon.style.backgroundColor = `hsl(${Math.random()*360}, 70%, 60%)`;
    balloon.style.animationDuration = 5 + Math.random()*5 + 's';
    document.body.appendChild(balloon);
    setTimeout(() => balloon.remove(), 10000);
}

// Animasi balon terus-menerus
setInterval(createBalloon, 800);

async function loadBirthdays() {
    const response = await fetch('data/students.json');
    const students = await response.json();
    
    const today = new Date();
    const todayStr = (today.getMonth()+1).toString().padStart(2,'0') + '-' + today.getDate().toString().padStart(2,'0');

    const container = document.getElementById('cards-container');
    let birthdayFound = false;

    students.forEach(student => {
        const birthDate = new Date(student.birth);
        const birthStr = (birthDate.getMonth()+1).toString().padStart(2,'0') + '-' + birthDate.getDate().toString().padStart(2,'0');

        if(birthStr === todayStr) {
            birthdayFound = true;
            const card = document.createElement('div');
            card.className = 'birthday-card';
            card.innerHTML = `<h2>Selamat Ulang Tahun, ${student.name}!</h2>
                              <p>Semoga hari ini penuh kebahagiaan 🎉</p>`;
            container.appendChild(card);
        }
    });

    if(birthdayFound) {
        document.getElementById('birthday-song').play();
    } else {
        const noCard = document.createElement('div');
        noCard.className = 'no-birthday';
        noCard.innerHTML = `<h2>Hari ini tidak ada yang ulang tahun</h2>
                            <p>Tetap semangat dan senyum ya! 🌟</p>`;
        container.appendChild(noCard);
    }
}

loadBirthdays();
</script>

</body>
</html>
