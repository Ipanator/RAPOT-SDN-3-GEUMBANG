<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ulang Tahun SDN 3 Gelumbang</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<style>
* {margin:0; padding:0; box-sizing:border-box; font-family:'Poppins', sans-serif;}
body {
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    text-align:center;
    color:#333;
    background: linear-gradient(135deg,#f6d365,#fda085);
    background-size: 400% 400%;
    animation: gradientBG 15s ease infinite;
    overflow: hidden;
}
@keyframes gradientBG {
    0%{background-position:0% 50%}
    50%{background-position:100% 50%}
    100%{background-position:0% 50%}
}
h1 {font-size:2.5rem; margin-bottom:10px; color:#fff; text-shadow:2px 2px 6px rgba(0,0,0,0.3);}
h2 {font-size:1.8rem; margin-bottom:20px; color:#fff;}
.card {
    background:rgba(255,255,255,0.95);
    padding:25px 35px;
    border-radius:15px;
    box-shadow:0 8px 25px rgba(0,0,0,0.2);
    max-width:400px;
    margin:15px auto;
    opacity:0;
    transform: scale(0.9);
    transition: all 0.6s ease;
    position: absolute;
    left:50%;
    top:50%;
    transform: translate(-50%,-50%) scale(0.9);
}
.card.show {
    opacity:1;
    transform: translate(-50%,-50%) scale(1);
}
#no-birthday {color:#fff; font-size:1.5rem; margin-top:30px;}
canvas {position:absolute; top:0; left:0; pointer-events:none;}
</style>
</head>
<body>

<h1>Selamat Ulang Tahun</h1>
<h2>SD Negeri 3 Gelumbang</h2>

<div id="birthday-container"></div>
<div id="no-birthday" style="display:none;">Tidak ada peserta yang ulang tahun hari ini.</div>

<audio id="birthday-audio" src="ulang_tahun.mp3" preload="auto"></audio>
<canvas id="confetti"></canvas>
<canvas id="particles"></canvas>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
<script>
// CONFIG
const config = {
    cardDelay: 200,       // delay kemunculan tiap card (ms)
    confettiDuration: 5000, 
    slideDuration: 4000    // durasi tiap slide card (ms)
};

// Tanggal hari ini
const today = new Date();
const todayStr = today.toISOString().slice(5,10);

// Load data ulang tahun
fetch('data_ultah.json')
.then(res => res.json())
.then(data => {
    const container = document.getElementById('birthday-container');
    const birthdayToday = data.filter(s => s.birth.slice(5) === todayStr);

    if(birthdayToday.length){
        document.getElementById('birthday-audio').play();
        // Confetti
        const duration = config.confettiDuration;
        const end = Date.now() + duration;
        (function frame() {
            confetti({particleCount:5, angle:60, spread:55, origin:{x:0}});
            confetti({particleCount:5, angle:120, spread:55, origin:{x:1}});
            if(Date.now() < end) requestAnimationFrame(frame);
        }());

        // Slide show peserta
        let current = 0;
        const showCard = () => {
            container.innerHTML = '';
            const s = birthdayToday[current];
            const birthDate = new Date(s.birth);
            const age = today.getFullYear() - birthDate.getFullYear();
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `<div class="name">${s.name}</div>
                              <div class="birth">${s.place} - ${s.birth} (Umur ${age})</div>`;
            container.appendChild(card);
            setTimeout(() => card.classList.add('show'), 50);
            current = (current + 1) % birthdayToday.length;
        };
        showCard();
        setInterval(showCard, config.slideDuration);

    } else {
        document.getElementById('no-birthday').style.display='block';
    }
})
.catch(err => {console.error(err); document.getElementById('no-birthday').style.display='block';});

// Particles background ringan
const canvas = document.getElementById('particles');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
const ctx = canvas.getContext('2d');
const particles = [];
for(let i=0;i<100;i++){
    particles.push({
        x: Math.random()*canvas.width,
        y: Math.random()*canvas.height,
        r: Math.random()*2+1,
        d: Math.random()*1+0.5
    });
}
function drawParticles(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle = "rgba(255,255,255,0.6)";
    particles.forEach(p => {
        ctx.beginPath();
        ctx.arc(p.x,p.y,p.r,0,Math.PI*2,true);
        ctx.fill();
        p.y += p.d;
        if(p.y > canvas.height) p.y = 0;
    });
    requestAnimationFrame(drawParticles);
}
drawParticles();
window.addEventListener('resize',()=>{canvas.width=window.innerWidth; canvas.height=window.innerHeight;});
</script>

</body>
</html>
