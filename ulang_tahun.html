<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ulang Tahun SDN 3 Gelumbang</title>
<link href="https://fonts.googleapis.com/css2?family=Fira+Sans:wght@400;600&family=Nunito:wght@400;600&family=Orbitron:wght@700&display=swap" rel="stylesheet">
<style>
body {
    margin:0;
    padding:0;
    font-family:'Fira Sans', sans-serif;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:flex-start;
    background: linear-gradient(135deg,#ff9a9e,#fad0c4,#fbc2eb,#a6c1ee);
    background-size: 400% 400%;
    animation: gradientBG 20s ease infinite;
    overflow:hidden;
    color:#fff;
}
@keyframes gradientBG {
    0%{background-position:0% 50%}
    50%{background-position:100% 50%}
    100%{background-position:0% 50%}
}

/* Header Bersinar Neon */
#main-title {
    font-family:'Orbitron', sans-serif;
    font-size:3rem;
    margin:30px 20px 10px;
    text-align:center;
    line-height:1.2;
    background: linear-gradient(90deg, #fffc00, #ff00ff, #00ffff, #ff7f50);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    text-shadow: 0 0 5px #fff, 0 0 10px #ff0, 0 0 20px #f0f, 0 0 30px #0ff;
}
#main-title span {
    display: block;
    animation: shimmer 2.5s infinite;
}
@keyframes shimmer {
    0% {text-shadow: 0 0 5px #fff;}
    50% {text-shadow: 0 0 20px #ff0, 0 0 25px #f0f, 0 0 30px #0ff;}
    100% {text-shadow: 0 0 5px #fff;}
}

/* Teks otomatis umur */
#age-text {
    font-family:'Orbitron', sans-serif;
    font-size:1.5rem;
    margin:10px 0 30px;
    color:#0ff;
    text-shadow:0 0 5px #fff,0 0 10px #0ff,0 0 15px #f0f;
    text-align:center;
}

/* Card Nama Peserta Neon */
#birthday-container {
    display:grid;
    grid-template-columns: repeat(auto-fit,minmax(180px,1fr));
    gap:20px;
    width:90%;
    max-width:1200px;
    margin-bottom:50px;
}
.card {
    background: rgba(0,0,0,0.2);
    backdrop-filter: blur(14px);
    padding:20px;
    border-radius:15px;
    box-shadow:0 0 10px #ff0, 0 0 20px #f0f, 0 0 30px #0ff;
    text-align:center;
    transition: transform 0.5s ease, box-shadow 0.5s ease;
}
.card:hover {
    transform: translateY(-10px);
    box-shadow:0 0 20px #ff0, 0 0 35px #f0f, 0 0 50px #0ff;
}
.name {
    font-family:'Fira Sans', sans-serif;
    font-size:1.4rem;
    font-weight:600;
    color:#ff0;
    text-shadow: 0 0 5px #fff, 0 0 10px #ff0, 0 0 15px #f0f;
    margin-bottom:8px;
}
.birth {
    font-family:'Nunito', sans-serif;
    font-size:1rem;
    color:#0ff;
    text-shadow: 0 0 3px #fff, 0 0 6px #0ff;
}

/* Canvas confetti & particle */
canvas {position:absolute; top:0; left:0; pointer-events:none; width:100%; height:100%;}
</style>
</head>
<body>

<h1 id="main-title">
  <span>Selamat Ulang Tahun</span>
  <span>Peserta Didik</span>
  <span>SDN 3 Gelumbang</span>
</h1>

<div id="age-text"></div>

<div id="birthday-container"></div>

<audio id="birthday-audio" src="ulang_tahun.mp3" preload="auto"></audio>
<canvas id="confetti"></canvas>
<canvas id="particles"></canvas>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
<script>
// Tanggal hari ini
const today = new Date();
const todayStr = today.toISOString().slice(5,10);

// Load data ulang tahun
fetch('data_ultah.json')
.then(res => res.json())
.then(data => {
    const container = document.getElementById('birthday-container');
    const ageText = document.getElementById('age-text');
    const birthdayToday = data.filter(s => s.birth.slice(5) === todayStr);

    if(birthdayToday.length){
        document.getElementById('birthday-audio').play();

        // Confetti terus berjalan
        function confettiLoop(){
            confetti({particleCount:5, angle:60, spread:55, origin:{x:0}});
            confetti({particleCount:5, angle:120, spread:55, origin:{x:1}});
            requestAnimationFrame(confettiLoop);
        }
        confettiLoop();

        // Tampilkan semua peserta sekaligus
        birthdayToday.forEach(s=>{
            const birthDate = new Date(s.birth);
            const age = today.getFullYear() - birthDate.getFullYear();
            const day = today.getDate();
            const month = today.toLocaleString('id-ID',{month:'long'});
            const year = today.getFullYear();
           ageText.innerHTML = `Hari ini, ${day} ${month} ${year} menjadi momen istimewa bagi ananda yang berulang tahun`;
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `<div class="name">${s.name}</div>
                              <div class="birth">${s.place} - ${s.birth} (Umur ${age})</div>`;
            container.appendChild(card);
        });

    } else {
        ageText.innerHTML = 'Tidak ada peserta yang ulang tahun hari ini';
        container.innerHTML = '<h2>Tidak ada peserta yang ulang tahun hari ini</h2>';
    }
})
.catch(err => {console.error(err); document.getElementById('birthday-container').innerHTML='<h2>Gagal memuat data</h2>';});

// Particles background
const canvas = document.getElementById('particles');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
const ctx = canvas.getContext('2d');
const particles = [];
for(let i=0;i<150;i++){
    particles.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,r:Math.random()*2+1,d:Math.random()*1+0.5});
}
function drawParticles(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle = "rgba(255,255,255,0.5)";
    particles.forEach(p=>{
        ctx.beginPath();
        ctx.arc(p.x,p.y,p.r,0,Math.PI*2,true);
        ctx.fill();
        p.y += p.d;
        if(p.y > canvas.height) p.y = 0;
    });
    requestAnimationFrame(drawParticles);
}
drawParticles();
window.addEventListener('resize',()=>{canvas.width=window.innerWidth; canvas.height=window.innerHeight;});
</script>

</body>
</html>
