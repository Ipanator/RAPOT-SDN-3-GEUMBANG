<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daftar Siswa</title>
<style>
  table { border-collapse: collapse; width: 100%; }
  th, td { border: 1px solid #333; padding: 8px; text-align: left; }
  th { background-color: #f2f2f2; }
</style>
</head>
<body>

<h2>Daftar Siswa</h2>
<table id="tabelSiswa">
  <tr>
    <th>Nama</th>
    <th>Tanggal Lahir</th>
  </tr>
</table>

<script>
fetch('data_siswa.json')
  .then(response => response.json())
  .then(data => {
    const tabel = document.getElementById('tabelSiswa');
    data.forEach(siswa => {
      const row = tabel.insertRow();
      const namaCell = row.insertCell(0);
      const tglCell = row.insertCell(1);
      namaCell.textContent = siswa.nama;
      tglCell.textContent = siswa.tgl_lahir;
    });
  })
  .catch(err => console.error('Gagal load data siswa:', err));
</script>

</body>
</html>
