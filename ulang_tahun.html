<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ulang Tahun SDN 3 Gelumbang</title>

<link href="https://fonts.googleapis.com/css2?family=Fira+Sans:wght@400;600&family=Nunito:wght@400;600&family=Orbitron:wght@700&display=swap" rel="stylesheet">

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
padding:0;
font-family:'Fira Sans',sans-serif;
min-height:100vh;
display:flex;
flex-direction:column;
align-items:center;
justify-content:flex-start;
background:linear-gradient(135deg,#ff9a9e,#fad0c4,#fbc2eb,#a6c1ee);
background-size:400% 400%;
animation:gradientBG 20s ease infinite;
color:#fff;
overflow-x:hidden;
}

@keyframes gradientBG{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

/* ================= HEADER ================= */

#main-title{
font-family:'Orbitron',sans-serif;
font-size:3rem;
margin:30px 20px 10px;
text-align:center;
line-height:1.2;

background:linear-gradient(90deg,#fffc00,#ff00ff,#00ffff,#ff7f50);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

text-shadow:0 0 5px #fff,0 0 10px #ff0,0 0 20px #f0f,0 0 30px #0ff;
}

#main-title span{
display:block;
animation:shimmer 2.5s infinite;
}

@keyframes shimmer{
0%{text-shadow:0 0 5px #fff;}
50%{text-shadow:0 0 20px #ff0,0 0 25px #f0f,0 0 30px #0ff;}
100%{text-shadow:0 0 5px #fff;}
}

/* ================= TANGGAL ================= */

#age-text{
font-family:'Orbitron',sans-serif;
font-size:1.5rem;
margin:10px 20px 30px;
color:#0ff;
text-shadow:0 0 5px #fff,0 0 10px #0ff,0 0 15px #f0f;
text-align:center;
max-width:900px;
}

/* ================= GRID SISWA ================= */

#birthday-container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
width:92%;
max-width:1200px;
margin-bottom:40px;
}

.card{
background:rgba(0,0,0,0.25);
backdrop-filter:blur(14px);
padding:22px;
border-radius:15px;

box-shadow:0 0 10px #ff0,0 0 20px #f0f,0 0 30px #0ff;

text-align:center;
transition:transform .4s ease,box-shadow .4s ease;
}

.card:hover{
transform:translateY(-10px);
box-shadow:0 0 20px #ff0,0 0 35px #f0f,0 0 50px #0ff;
}

.name{
font-size:1.4rem;
font-weight:600;
color:#ff0;
text-shadow:0 0 5px #fff,0 0 10px #ff0,0 0 15px #f0f;
margin-bottom:8px;
}

.birth{
font-family:'Nunito',sans-serif;
font-size:1rem;
color:#0ff;
text-shadow:0 0 3px #fff,0 0 6px #0ff;
}

/* ================= DOA ================= */

#doa-text{
max-width:900px;
margin:40px 20px 30px;
text-align:center;
font-family:'Nunito',sans-serif;
font-size:1.15rem;
line-height:1.7;
color:#fff;

background:rgba(0,0,0,0.25);
padding:22px 30px;
border-radius:14px;

backdrop-filter:blur(10px);

text-shadow:0 0 5px #fff,0 0 10px #0ff;

box-shadow:0 0 15px rgba(255,255,255,0.3);
}

/* ================= SHARE BUTTON ================= */

#share-section{
margin-bottom:60px;
text-align:center;
}

#share-btn{
padding:12px 28px;
border-radius:30px;
font-family:'Orbitron',sans-serif;
font-size:1rem;
cursor:pointer;
border:none;
color:#fff;
background:linear-gradient(90deg,#ff00ff,#00ffff,#fffc00);
box-shadow:0 0 10px #ff0,0 0 20px #0ff;
transition:all .3s ease;
}

#share-btn:hover{
transform:scale(1.05);
box-shadow:0 0 20px #ff0,0 0 30px #0ff;
}

/* ================= PARTICLE ================= */

canvas{
position:fixed;
top:0;
left:0;
pointer-events:none;
width:100%;
height:100%;
z-index:-1;
}

/* RESPONSIVE */

@media (max-width:900px){
#main-title{font-size:2.3rem;}
#age-text{font-size:1.3rem;}
}

@media (max-width:600px){
#main-title{font-size:1.9rem;}
#age-text{font-size:1.15rem;}
.name{font-size:1.2rem;}
.birth{font-size:0.9rem;}
#doa-text{font-size:1rem;padding:18px;}
}

@media (max-width:400px){
#main-title{font-size:1.6rem;}
#age-text{font-size:1rem;}
.card{padding:18px;}
}

</style>
</head>

<body>

<h1 id="main-title">
<span>Selamat Ulang Tahun</span>
<span>Peserta Didik</span>
<span>SDN 3 Gelumbang</span>
</h1>

<div id="age-text"></div>

<div id="birthday-container"></div>

<div id="doa-text">
Semoga di usia yang bertambah ini, ananda senantiasa diberi kesehatan, keberkahan, kemudahan dalam belajar, serta tumbuh menjadi generasi yang cerdas, berakhlak baik, dan membanggakan orang tua, guru, serta sekolah.
</div>

<div id="share-section">
<button id="share-btn" onclick="sharePage()">📤 Bagikan Halaman Ini</button>
</div>

<audio id="birthday-audio" src="hbd.mp3" preload="auto" loop></audio>

<canvas id="particles"></canvas>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script>

const today = new Date();
const todayStr = today.toISOString().slice(5,10);

fetch('data_ultah.json')
.then(res=>res.json())
.then(data=>{

const container=document.getElementById('birthday-container');
const ageText=document.getElementById('age-text');

const birthdayToday=data.filter(s=>s.birth.slice(5)===todayStr);

if(birthdayToday.length){

document.getElementById('birthday-audio').play();

function confettiLoop(){
confetti({particleCount:5,angle:60,spread:55,origin:{x:0}});
confetti({particleCount:5,angle:120,spread:55,origin:{x:1}});
requestAnimationFrame(confettiLoop);
}
confettiLoop();

birthdayToday.forEach(s=>{

const birthDate=new Date(s.birth);
const age=today.getFullYear()-birthDate.getFullYear();

const day=today.getDate();
const month=today.toLocaleString('id-ID',{month:'long'});
const year=today.getFullYear();

ageText.innerHTML=`Hari ini, ${day} ${month} ${year} menjadi momen istimewa bagi ananda yang berulang tahun`;

const card=document.createElement('div');
card.className='card';

card.innerHTML=`
<div class="name">${s.name}</div>
<div class="birth">${s.place} - ${s.birth} (Umur ${age})</div>
`;

container.appendChild(card);

});

}else{

ageText.innerHTML="";
container.innerHTML="";

}

})
.catch(err=>{
console.error(err);
document.getElementById('birthday-container').innerHTML='<h2>Gagal memuat data</h2>';
});

/* SHARE */

function sharePage(){
if(navigator.share){
navigator.share({
title:"Ulang Tahun Peserta Didik SDN 3 Gelumbang",
text:"Lihat ucapan ulang tahun peserta didik SDN 3 Gelumbang di halaman ini",
url:window.location.href
});
}else{
navigator.clipboard.writeText(window.location.href);
alert("Link berhasil disalin");
}
}

/* AUTOPLAY MUSIK UNTUK HP */

document.addEventListener("click", function(){
const audio = document.getElementById("birthday-audio");
if(audio.paused){
audio.play().catch(()=>{});
}
},{once:true});

/* PARTICLES */

const canvas=document.getElementById("particles");
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

const ctx=canvas.getContext("2d");

const particles=[];

for(let i=0;i<150;i++){
particles.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*2+1,
d:Math.random()*1+0.5
});
}

function drawParticles(){

ctx.clearRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="rgba(255,255,255,0.5)";

particles.forEach(p=>{

ctx.beginPath();
ctx.arc(p.x,p.y,p.r,0,Math.PI*2,true);
ctx.fill();

p.y+=p.d;

if(p.y>canvas.height){
p.y=0;
}

});

requestAnimationFrame(drawParticles);

}

drawParticles();

window.addEventListener("resize",()=>{
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;
});

</script>

</body>
</html>
