<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Akses Sistem</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#0b1120;
overflow:hidden;
color:white;
}

/* =========================
   PORTAL AI BACKGROUND
========================= */

.portal{
position:absolute;
width:900px;
height:900px;
border-radius:50%;
background:radial-gradient(circle,
rgba(0,255,255,0.25),
transparent 60%);
filter:blur(80px);
animation:portalMove 12s linear infinite;
}

@keyframes portalMove{
0%{
transform:rotate(0deg) scale(1);
}
50%{
transform:rotate(180deg) scale(1.2);
}
100%{
transform:rotate(360deg) scale(1);
}
}

/* =========================
   LIGHT BEAM EFFECT
========================= */

.light{
position:absolute;
width:200%;
height:200%;
background:linear-gradient(
120deg,
transparent,
rgba(0,255,255,0.15),
transparent
);
animation:lightMove 8s linear infinite;
}

@keyframes lightMove{
0%{
transform:translateX(-100%) rotate(25deg);
}
100%{
transform:translateX(100%) rotate(25deg);
}
}

/* =========================
   LOGIN BOX
========================= */

.container{
position:relative;
background:rgba(20,30,60,0.6);
backdrop-filter:blur(10px);
padding:40px;
border-radius:14px;
width:320px;
text-align:center;
box-shadow:0 0 25px rgba(0,0,0,0.5);
z-index:2;
}

h2{
margin-bottom:20px;
font-weight:500;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:6px;
background:#111a35;
color:white;
}

input:focus{
outline:none;
box-shadow:0 0 5px cyan;
}

/* =========================
   BUTTON (WARNA DIPERBAIKI)
========================= */

button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:6px;
background:#2bb3ff;
color:white;
font-weight:500;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#1994db;
box-shadow:0 0 10px rgba(0,150,255,0.6);
}

</style>
</head>

<body>

<div class="portal"></div>
<div class="light"></div>

<div class="container">

<h2>Akses Sistem</h2>

<input type="text" placeholder="Username">
<input type="password" placeholder="Password">

<button>Masuk Sistem</button>

</div>

</body>
</html>
