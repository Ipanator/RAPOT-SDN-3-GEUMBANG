<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Akses Sistem AI Portal</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#0b1120;
  overflow:hidden;
  color:white;
  position:relative;
}

/* =========================
   GRID TEKNOLOGI
========================= */
.grid{
  position:absolute;
  width:100%;
  height:100%;
  background-image:
    linear-gradient(rgba(0,255,255,0.05) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,255,255,0.05) 1px, transparent 1px);
  background-size:50px 50px;
  pointer-events:none;
  animation:gridMove 20s linear infinite;
}

@keyframes gridMove{
  0%{background-position:0 0;}
  100%{background-position:200px 200px;}
}

/* =========================
   HOLOGRAM UI PANEL
========================= */
.container{
  position:relative;
  background:rgba(20,30,60,0.5);
  backdrop-filter:blur(12px);
  padding:40px;
  border-radius:14px;
  width:320px;
  text-align:center;
  box-shadow:0 0 25px rgba(0,0,0,0.5);
  z-index:2;
}

h2{
  margin-bottom:20px;
  font-weight:500;
  color:#00fff0;
  text-shadow:0 0 5px rgba(0,255,255,0.5);
}

input{
  width:100%;
  padding:12px;
  margin:10px 0;
  border:none;
  border-radius:6px;
  background:#111a35;
  color:white;
}

input:focus{
  outline:none;
  box-shadow:0 0 5px #00fff0;
}

button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:6px;
  background:#00fff0;
  color:#001a1f;
  font-weight:500;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  background:#00c4d4;
  box-shadow:0 0 10px rgba(0,255,255,0.6);
}

/* =========================
   AI PARTICLE
========================= */
.particle{
  position:absolute;
  width:2px;
  height:2px;
  background:#00fff0;
  opacity:0.7;
  animation:particleMove 12s linear infinite;
}

@keyframes particleMove{
  0%{transform:translateY(100vh) translateX(0);}
  50%{opacity:1;}
  100%{transform:translateY(-10vh) translateX(50px); opacity:0;}
}

/* =========================
   DIGITAL RAIN (MATRIX)
========================= */
.rain{
  position:absolute;
  width:2px;
  height:20px;
  background:#0ff;
  opacity:0.2;
  animation:rainFall linear infinite;
}

@keyframes rainFall{
  0%{top:-20px;}
  100%{top:100vh;}
}
</style>
</head>

<body>

<!-- GRID TEKNOLOGI -->
<div class="grid"></div>

<!-- HOLOGRAM PANEL LOGIN -->
<div class="container">
<h2>Akses Sistem</h2>
<input type="text" placeholder="Username">
<input type="password" placeholder="Password">
<button>Masuk Sistem</button>
</div>

<!-- AI PARTICLE -->
<script>
for(let i=0;i<50;i++){
  let p=document.createElement("div");
  p.className="particle";
  p.style.left=Math.random()*100+"%";
  p.style.animationDuration=(5+Math.random()*10)+"s";
  document.body.appendChild(p);
}
</script>

<!-- DIGITAL RAIN -->
<script>
for(let i=0;i<80;i++){
  let r=document.createElement("div");
  r.className="rain";
  r.style.left=Math.random()*100+"%";
  r.style.animationDuration=(2+Math.random()*5)+"s";
  r.style.height=(10+Math.random()*30)+"px";
  document.body.appendChild(r);
}
</script>

</body>
</html>
