<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SDN 3 GELUMBANG</title>
<link rel="icon" type="image/png" href="logo2.png">

<style>
* {
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

/* BODY & SPLASH */
body{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  background:#0b1120;
  overflow:hidden;
  color:white;
  position:relative;
}

/* GRID TEKNOLOGI */
.grid{
  position:absolute;
  width:100%;
  height:100%;
  background-image:
    linear-gradient(rgba(0,200,255,0.05) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,200,255,0.05) 1px, transparent 1px);
  background-size:50px 50px;
  pointer-events:none;
  animation:gridMove 20s linear infinite;
  z-index:0;
}
@keyframes gridMove{
  0%{background-position:0 0;}
  100%{background-position:200px 200px;}
}

/* HOLOGRAM PANEL */
.container{
  position:relative;
  background:rgba(20,30,60,0.5);
  backdrop-filter:blur(12px);
  padding:40px;
  border-radius:14px;
  width:320px;
  text-align:center;
  box-shadow:0 0 25px rgba(0,0,0,0.5);
  z-index:2;
}
h2{
  margin-bottom:20px;
  font-weight:500;
  color:#00e5ff;
  text-shadow:0 0 5px rgba(0,255,255,0.5);
}
input{
  width:100%;
  padding:12px;
  margin:10px 0;
  border:none;
  border-radius:6px;
  background:#111a35;
  color:white;
}
input:focus{
  outline:none;
  box-shadow:0 0 5px #00e5ff;
}
button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:6px;
  background: linear-gradient(135deg,#ffd54f,#ffca28);
  color:#001a1f;
  font-weight:500;
  cursor:pointer;
  transition:0.3s;
}
button:hover{
  background:#ffb300;
  box-shadow:0 0 10px rgba(255,215,0,0.6);
}

/* AI PARTICLE */
.particle{
  position:absolute;
  width:2px;
  height:2px;
  background:#00e5ff;
  opacity:0.7;
  animation:particleMove 12s linear infinite;
}
@keyframes particleMove{
  0%{transform:translateY(100vh) translateX(0);}
  50%{opacity:1;}
  100%{transform:translateY(-10vh) translateX(50px); opacity:0;}
}

/* DIGITAL RAIN */
.rain{
  position:absolute;
  width:2px;
  height:20px;
  background:#00fff0;
  opacity:0.2;
  animation:rainFall linear infinite;
}
@keyframes rainFall{
  0%{top:-20px;}
  100%{top:100vh;}
}

/* SPLASH SCREEN */
#splashScreen {
  position: fixed;
  inset:0;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
  color:white;
  padding:20px;
  background: linear-gradient(to bottom right, #004aad, #00c6ff);
  z-index:9999;
}
.splash-title {
  font-size:2.5rem;
  font-weight:700;
  line-height:1.3;
  text-shadow:0 0 10px rgba(255,255,255,0.6),0 0 20px rgba(255,255,255,0.3);
  opacity:0;
  transform:translateY(20px);
  animation:fadeUp 1s ease forwards;
}
.splash-tagline{
  font-size:1.5rem;
  font-weight:600;
  margin-top:10px;
  color:#fffacd;
  text-shadow:0 0 8px rgba(255,255,200,0.5);
  opacity:0;
  transform:translateY(20px);
  animation:fadeUp 4s ease forwards;
  animation-delay:3s;
}
.splash-subtagline{
  font-size:1rem;
  font-weight:400;
  margin-top:5px;
  color:#f0f0f0;
  text-shadow:0 0 5px rgba(255,255,255,0.3);
  opacity:0;
  transform:translateY(20px);
  animation:fadeUp 4s ease forwards;
  animation-delay:3s;
}
#mulaiBtn{
  margin-top:20px;
  padding:15px 35px;
  font-size:18px;
  font-weight:bold;
  background: linear-gradient(135deg,#ffd54f,#ffca28);
  border:none;
  border-radius:10px;
  cursor:pointer;
  transition:.25s;
  opacity:0;
  transform:translateY(20px);
  animation:fadeUp 1s ease forwards;
  animation-delay:1s;
}
#mulaiBtn:hover{
  transform: scale(1.08);
}
@keyframes fadeUp{
  to{opacity:1;transform:translateY(0);}
}

/* FOOTER */
footer{
  width:100%;
  padding:10px;
  background:rgba(0,0,0,0.75);
  position:fixed;
  bottom:0;
  left:0;
  text-align:center;
  font-size:14px;
  z-index:2000;
}
</style>
</head>

<body>

<!-- GRID TEKNOLOGI -->
<div class="grid"></div>

<!-- SPLASH -->
<div id="splashScreen">
  <h1 class="splash-title">
    SELAMAT DATANG DI<br>WEBSITE SD NEGERI 3 GELUMBANG
  </h1>
  <p class="splash-tagline">We Program We Develop</p>
  <p class="splash-subtagline">(Kami memprogram, kami mengembangkan)</p>
  <button id="mulaiBtn">Masuk</button>
</div>

<!-- HOLOGRAM PANEL LOGIN -->
<div class="container">
  <h2>Akses Sistem</h2>
  <input type="text" placeholder="Username">
  <input type="password" placeholder="Password">
  <button>Masuk Sistem</button>
</div>

<!-- AI PARTICLE -->
<script>
for(let i=0;i<50;i++){
  let p=document.createElement("div");
  p.className="particle";
  p.style.left=Math.random()*100+"%";
  p.style.animationDuration=(5+Math.random()*10)+"s";
  document.body.appendChild(p);
}
</script>

<!-- DIGITAL RAIN -->
<script>
for(let i=0;i<80;i++){
  let r=document.createElement("div");
  r.className="rain";
  r.style.left=Math.random()*100+"%";
  r.style.animationDuration=(2+Math.random()*5)+"s";
  r.style.height=(10+Math.random()*30)+"px";
  document.body.appendChild(r);
}
</script>

</body>
</html>
