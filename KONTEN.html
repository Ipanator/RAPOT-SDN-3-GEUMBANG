<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>SDN 3 Gelumbang</title>


<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
    overflow:hidden;
    font-family:'Outfit',sans-serif;
    background:#061326;
}

.scene{
position:relative;
width:100%;
height:100vh;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
background:
radial-gradient(circle at 20% 20%,rgba(0,183,255,.18),transparent 30%),
radial-gradient(circle at 80% 20%,rgba(112,0,255,.15),transparent 35%),
radial-gradient(circle at 50% 100%,rgba(0,255,255,.15),transparent 45%),
linear-gradient(180deg,#061326,#0a2e5f,#020b16);
animation:bg 18s ease-in-out infinite alternate;
}

@keyframes bg{
0%{transform:scale(1);}
100%{transform:scale(1.05);}
}

.scene::after{
content:"";
position:absolute;
inset:0;
background:radial-gradient(circle,transparent 40%,rgba(0,0,0,.45));
pointer-events:none;
}

.aurora{
position:absolute;
width:180%;
height:180%;
background:conic-gradient(from 0deg,
rgba(0,255,255,.15),
rgba(0,140,255,.18),
rgba(124,77,255,.12),
rgba(0,255,255,.15));
filter:blur(120px);
animation:rotate 40s linear infinite;
}

@keyframes rotate{
to{transform:rotate(360deg);}
}

.card{
position:relative;
width:75%;
max-width:650px;
padding:55px;
text-align:center;
border-radius:35px;
background:rgba(255,255,255,.08);
backdrop-filter:blur(20px);
border:1px solid rgba(255,255,255,.15);
box-shadow:0 20px 60px rgba(0,0,0,.35);
animation:float 5s ease-in-out infinite;
z-index:5;
}

@keyframes float{
50%{transform:translateY(-10px);}
}
  
h1{
    color:#fff;
    font-size:50px;
    font-weight:600;
    line-height:1.3;
    letter-spacing:-1px;
    text-shadow:0 2px 8px rgba(0,0,0,.2);
}

.line{
width:80px;
height:2px;
margin:28px auto;
background:linear-gradient(90deg,transparent,#7cecff,transparent);
}

p{
color:#d7e9ff;
font-size:18px;
font-weight:400;
font-style:italic;
letter-spacing:0.8px;
text-transform:none;
opacity:.85;
}

.star{
position:absolute;
background:#fff;
border-radius:50%;
animation:twinkle linear infinite;
}

@keyframes twinkle{
0%,100%{opacity:.2;transform:scale(.5);}
50%{opacity:1;transform:scale(1.8);}
}

.bubble{
position:absolute;
bottom:-80px;
border-radius:50%;
background:rgba(255,255,255,.05);
backdrop-filter:blur(5px);
animation:rise linear infinite;
}

@keyframes rise{
to{
transform:translateY(-120vh);
}
}

.glow{
position:absolute;
width:500px;
height:500px;
left:-150px;
top:-150px;
background:#00c8ff;
border-radius:50%;
filter:blur(170px);
opacity:.18;
animation:moveGlow 12s ease-in-out infinite alternate;
}

@keyframes moveGlow{
100%{
transform:translate(120px,80px);
}
}
</style>
</head>

<body>

<div class="scene">

<div class="glow"></div>

<div class="aurora"></div>

<div class="card">

<h1>
Lelah itu wajar<br>
  
<br>

</h1>

<div class="line"></div>

<p>— Menyerah bukan jawabannya</p>

</div>

</div>

<script>

const scene=document.querySelector(".scene");

for(let i=0;i<120;i++){

const s=document.createElement("div");

s.className="star";

const size=Math.random()*3+1;

s.style.width=size+"px";

s.style.height=size+"px";

s.style.left=Math.random()*100+"%";

s.style.top=Math.random()*100+"%";

s.style.animationDuration=(Math.random()*4+2)+"s";

scene.appendChild(s);

}

for(let i=0;i<18;i++){

const b=document.createElement("div");

b.className="bubble";

const size=Math.random()*35+10;

b.style.width=size+"px";

b.style.height=size+"px";

b.style.left=Math.random()*100+"%";

b.style.animationDuration=(Math.random()*15+10)+"s";

b.style.animationDelay=(-Math.random()*20)+"s";

scene.appendChild(b);

}

</script>

</body>
</html>
