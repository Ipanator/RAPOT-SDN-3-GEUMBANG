<!DOCTYPE html>
<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Lucky Prize Wheel</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
body{
background:linear-gradient(135deg,#0f172a,#1e3a8a,#2563eb);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
color:#fff;
}

.container{
text-align:center;
}

h1{
margin-bottom:20px;
text-shadow:0 0 20px cyan;
}

#wheel{
width:420px;
height:420px;
border-radius:50%;
border:8px solid #fff;
box-shadow:0 0 40px cyan;
transition:transform 6s cubic-bezier(.17,.67,.25,1);
}

.pointer{
width:0;
height:0;
border-left:18px solid transparent;
border-right:18px solid transparent;
border-top:40px solid gold;
margin:auto;
margin-bottom:-12px;
z-index:5;
position:relative;
}

button{
margin-top:30px;
padding:15px 40px;
font-size:20px;
border:none;
border-radius:30px;
cursor:pointer;
background:#00e5ff;
color:#000;
font-weight:bold;
box-shadow:0 0 20px cyan;
}

button:hover{
transform:scale(1.05);
}

#hasil{
margin-top:20px;
font-size:26px;
font-weight:bold;
color:yellow;
text-shadow:0 0 15px gold;
}
</style>

</head>
<body>

<div class="container">

<h1>🎁 Lucky Prize Wheel 🎁</h1>

<div class="pointer"></div>

<canvas id="wheel" width="420" height="420"></canvas>

<br>

<button onclick="spin()">PUTAR</button>

<div id="hasil">Semoga Beruntung!</div>

</div>

<script>

// ===============================
// PENGATURAN HADIAH
// ===============================

const hadiah=[
"Pulpen",
"Buku",
"Sticker",
"Boneka",
"Voucher",
"Tumbler",
"Payung",
"Coba Lagi"
];

// Bobot peluang (semakin besar semakin sering keluar)
const peluang=[0,0,0,0,0,0,0,100];

// ===============================

const canvas=document.getElementById("wheel");
const ctx=canvas.getContext("2d");

const warna=[
"#ef4444",
"#f97316",
"#eab308",
"#22c55e",
"#06b6d4",
"#3b82f6",
"#8b5cf6",
"#ec4899"
];

const radius=210;
const total=hadiah.length;
const sudut=2*Math.PI/total;

function gambar(){

for(let i=0;i<total;i++){

ctx.beginPath();
ctx.moveTo(radius,radius);

ctx.fillStyle=warna[i%warna.length];

ctx.arc(radius,radius,radius,i*sudut,(i+1)*sudut);

ctx.fill();

ctx.save();

ctx.translate(radius,radius);

ctx.rotate(i*sudut+sudut/2);

ctx.fillStyle="#fff";

ctx.font="bold 18px Arial";

ctx.textAlign="right";

ctx.fillText(hadiah[i],180,8);

ctx.restore();

}

}

gambar();

let putaran=0;
let jalan=false;

function pilihHadiah(){

let totalBobot=peluang.reduce((a,b)=>a+b);

let acak=Math.random()*totalBobot;

let jumlah=0;

for(let i=0;i<peluang.length;i++){

jumlah+=peluang[i];

if(acak<jumlah){

return i;

}

}

return 0;

}

function spin(){

if(jalan) return;

jalan=true;

let index=pilihHadiah();

let derajat=360/total;

let tujuan=(360-(index*derajat)-derajat/2);

putaran+=2160+tujuan+Math.random()*10;

canvas.style.transform="rotate("+putaran+"deg)";

setTimeout(()=>{

document.getElementById("hasil").innerHTML="🎉 Hadiah: <b>"+hadiah[index]+"</b>";

jalan=false;

},6000);

}

</script>

</body>
</html>
