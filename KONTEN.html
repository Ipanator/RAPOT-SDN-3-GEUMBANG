<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Aurora Background</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
overflow:hidden;
background:#06152d;
font-family:'Poppins',sans-serif;
height:100vh;
}

.scene{
position:relative;
width:100%;
height:100vh;
overflow:hidden;
background:
radial-gradient(circle at 20% 20%,rgba(0,183,255,.18),transparent 35%),
radial-gradient(circle at 80% 25%,rgba(93,63,255,.18),transparent 35%),
radial-gradient(circle at 50% 80%,rgba(0,255,255,.12),transparent 40%),
linear-gradient(180deg,#06152d,#0a2f5d,#04101f);
animation:bgMove 18s ease-in-out infinite alternate;
}

@keyframes bgMove{
0%{transform:scale(1);}
100%{transform:scale(1.08);}
}

.aurora{
position:absolute;
width:180%;
height:180%;
left:-40%;
top:-40%;
background:
conic-gradient(from 180deg,
rgba(0,255,255,.10),
rgba(0,132,255,.15),
rgba(149,0,255,.10),
rgba(0,255,255,.10));
filter:blur(100px);
animation:spin 45s linear infinite;
opacity:.9;
}

@keyframes spin{
to{
transform:rotate(360deg);
}
}

.panel{
position:absolute;
left:50%;
top:50%;
transform:translate(-50%,-50%);
width:80%;
max-width:700px;
padding:40px;
border-radius:35px;
background:rgba(255,255,255,.08);
backdrop-filter:blur(20px);
border:1px solid rgba(255,255,255,.15);
box-shadow:
0 0 40px rgba(0,180,255,.15),
0 0 80px rgba(0,180,255,.08);
text-align:center;
animation:float 5s ease-in-out infinite;
}

@keyframes float{
50%{
transform:translate(-50%,-53%);
}
}

.title{
font-size:45px;
font-weight:700;
color:white;
text-shadow:0 0 25px cyan;
letter-spacing:2px;
}

.subtitle{
margin-top:15px;
font-size:18px;
color:#d8eaff;
opacity:.9;
}

.wave{
position:absolute;
bottom:-120px;
left:-20%;
width:140%;
height:260px;
background:radial-gradient(circle,#33d6ff55,transparent 70%);
filter:blur(40px);
animation:wave 8s ease-in-out infinite;
}

@keyframes wave{
50%{
transform:translateY(-40px) scale(1.08);
}
}

.star{
position:absolute;
width:3px;
height:3px;
background:white;
border-radius:50%;
animation:twinkle linear infinite;
}

@keyframes twinkle{
0%,100%{
opacity:.2;
transform:scale(.5);
}
50%{
opacity:1;
transform:scale(1.8);
}
}

.bubble{
position:absolute;
bottom:-100px;
border-radius:50%;
background:rgba(255,255,255,.08);
backdrop-filter:blur(6px);
animation:rise linear infinite;
}

@keyframes rise{
to{
transform:translateY(-120vh);
}
}
</style>

</head>
<body>

<div class="scene">

<div class="aurora"></div>

<div class="panel">
<div class="title">Hidup terus berjalan, jangan lupa menikmati perjalanannya.</div>
<div class="subtitle">
Feel the Moment.
</div>
</div>

<div class="wave"></div>

</div>

<script>

for(let i=0;i<180;i++){

let s=document.createElement("div");

s.className="star";

s.style.left=Math.random()*100+"%";
s.style.top=Math.random()*100+"%";

let d=Math.random()*3+1;

s.style.width=d+"px";
s.style.height=d+"px";

s.style.animationDuration=(Math.random()*4+2)+"s";

document.querySelector(".scene").appendChild(s);

}

for(let i=0;i<25;i++){

let b=document.createElement("div");

b.className="bubble";

let size=Math.random()*80+20;

b.style.width=size+"px";
b.style.height=size+"px";

b.style.left=Math.random()*100+"%";

b.style.animationDuration=(Math.random()*20+12)+"s";

b.style.animationDelay=(-Math.random()*20)+"s";

document.querySelector(".scene").appendChild(b);

}

</script>

</body>
</html>
