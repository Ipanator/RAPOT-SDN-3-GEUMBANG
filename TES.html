<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cyber Camera</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
overflow:hidden;
background:#000;
font-family:Arial,sans-serif;
}

video{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
transform:scaleX(-1);
}

.overlay{
position:fixed;
inset:0;
pointer-events:none;
}

.grid{
position:absolute;
width:100%;
height:100%;
background-image:
linear-gradient(rgba(0,180,255,.15) 1px,transparent 1px),
linear-gradient(90deg,rgba(0,180,255,.15) 1px,transparent 1px);
background-size:50px 50px;
}

.circle{
position:absolute;
width:350px;
height:350px;
border:2px solid rgba(0,255,255,.5);
border-radius:50%;
left:50%;
top:50%;
transform:translate(-50%,-50%);
animation:spin 15s linear infinite;
}

.circle::before{
content:"";
position:absolute;
inset:30px;
border:1px dashed rgba(0,255,255,.5);
border-radius:50%;
}

.scan{
position:absolute;
width:100%;
height:3px;
background:#00eaff;
box-shadow:0 0 20px cyan;
animation:scan 4s linear infinite;
}

.status{
position:absolute;
top:20px;
left:20px;
color:#00ffff;
font-size:18px;
text-shadow:0 0 10px cyan;
}

.particle{
position:absolute;
width:3px;
height:3px;
background:#00d9ff;
border-radius:50%;
animation:float 10s linear infinite;
}

@keyframes spin{
from{transform:translate(-50%,-50%) rotate(0deg);}
to{transform:translate(-50%,-50%) rotate(360deg);}
}

@keyframes scan{
0%{top:-5px;}
100%{top:100%;}
}

@keyframes float{
0%{
transform:translateY(100vh);
opacity:0;
}
20%{
opacity:1;
}
100%{
transform:translateY(-100px);
opacity:0;
}
}
</style>
</head>
<body>

<video id="cam" autoplay playsinline muted></video>

<div class="overlay">

<div class="grid"></div>

<div class="circle"></div>

<div class="scan"></div>

<div class="status">
CYBER MODE ONLINE
</div>

</div>

<script>

const video=document.getElementById("cam");

navigator.mediaDevices.getUserMedia({
video:{
facingMode:"user"
},
audio:false
}).then(stream=>{
video.srcObject=stream;
});

for(let i=0;i<60;i++){

let p=document.createElement("div");

p.className="particle";

p.style.left=Math.random()*100+"%";

p.style.animationDuration=(5+Math.random()*8)+"s";

p.style.animationDelay=Math.random()*8+"s";

document.querySelector(".overlay").appendChild(p);

}

</script>

</body>
</html>
