<div class="server-status" id="onlineUser">
Pengunjung hari ini: 0
</div>

<script>
function getPengunjungHariIni(){
    let data = localStorage.getItem("pengunjungHariIni");
    if(!data) return {tanggal:"", jumlah:0};
    return JSON.parse(data);
}

function setPengunjungHariIni(tanggal,jumlah){
    localStorage.setItem("pengunjungHariIni", JSON.stringify({tanggal,jumlah}));
}

function updatePengunjungRandom(){
    let now = new Date();
    let tanggal = now.toISOString().split('T')[0]; // yyyy-mm-dd
    let data = getPengunjungHariIni();

    // reset tiap hari jam 00:00
    if(data.tanggal !== tanggal){
        data.jumlah = 0;
        data.tanggal = tanggal;
    }

    // random penambahan 1-5 pengunjung tiap update
    let tambahan = Math.floor(Math.random()*5)+1;

    data.jumlah += tambahan;

    // batasi maksimal 700
    if(data.jumlah > 700) data.jumlah = 700;

    setPengunjungHariIni(data.tanggal, data.jumlah);

    // tampilkan
    document.getElementById("onlineUser").innerText = 
        "Pengunjung hari ini: " + data.jumlah + " pengunjung";

    // interval update berikutnya acak 5-30 detik
    let interval = Math.floor(Math.random()*25000)+5000;
    setTimeout(updatePengunjungRandom, interval);
}

// mulai simulasi
updatePengunjungRandom();
</script>
