<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Pengunjung Website</title>

<style>

body{
font-family:Arial;
text-align:center;
background:#0b1c2c;
color:white;
margin-top:100px;
}

#visitorToday{
font-size:28px;
font-weight:bold;
color:#00ffcc;
}

</style>

</head>
<body>

<h2 id="visitorToday">Pengunjung Hari Ini : 1 orang</h2>

<script>

/* =========================
   COUNTER PENGUNJUNG REALISTIS
   ========================= */

function visitorCounter(){

let today = new Date().toDateString()

let savedDate = localStorage.getItem("visitorDate")
let visitor = parseInt(localStorage.getItem("visitorCount") || 1)

/* RESET SETIAP HARI */

if(savedDate !== today){

visitor = 1

localStorage.setItem("visitorDate", today)
localStorage.setItem("visitorCount", visitor)

}

/* JAM SEKARANG */

let hour = new Date().getHours()

/* TARGET REALISTIS */

let target = 50

if(hour >= 6 && hour < 12){

target = 300 + Math.floor(Math.random()*150)

}
else if(hour >= 12 && hour < 18){

target = 700 + Math.floor(Math.random()*200)

}
else if(hour >= 18 && hour < 22){

target = 850 + Math.floor(Math.random()*50)

}
else{

target = 900 + Math.floor(Math.random()*20)

}

/* TAMBAH MENUJU TARGET */

if(visitor < target){

visitor += Math.floor(Math.random()*3) + 1

}

localStorage.setItem("visitorCount", visitor)

document.getElementById("visitorToday").innerText =
"Pengunjung Hari Ini : " + visitor + " orang"

/* UPDATE REALTIME */

setTimeout(visitorCounter,60000)

}

visitorCounter()

</script>

</body>
</html>
