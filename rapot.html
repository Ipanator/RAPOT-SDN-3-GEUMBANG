<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Akses Sistem</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#0b111f;
overflow:hidden;
color:white;
}

/* canvas background */

canvas{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:0;
}

/* card */

.container{

position:relative;
z-index:2;

background:rgba(255,255,255,0.05);
backdrop-filter:blur(10px);

padding:40px;
border-radius:14px;

text-align:center;
width:320px;

box-shadow:0 0 30px rgba(0,255,255,0.2);

}

.title{

font-size:20px;
margin-bottom:8px;

}

.subtitle{

font-size:13px;
opacity:0.7;
margin-bottom:20px;

}

.countdown{

font-size:48px;
font-weight:600;
color:#00ffe5;

}

.info{

font-size:12px;
opacity:0.7;
margin-top:10px;

}

</style>
</head>

<body>

<canvas id="bg"></canvas>

<div class="container">

<div class="title">
Menghubungkan ke Sistem
</div>

<div class="subtitle">
Menyiapkan koneksi aman...
</div>

<div class="countdown" id="count">
5
</div>

<div class="info">
Harap tunggu sebentar
</div>

</div>

<script>

/* COUNTDOWN */

let waktu = 5;

let timer = setInterval(function(){

waktu--;

document.getElementById("count").innerText = waktu;

if(waktu <= 0){

clearInterval(timer);

window.location.href="http://10.96.189.165:8535/";

}

},1000);


/* CANVAS */

const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;


/* STARS */

let stars = [];

for(let i=0;i<120;i++){

stars.push({

x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
size:Math.random()*2,
speed:Math.random()*0.3

});

}


/* METEOR */

let meteors = [];

function createMeteor(){

meteors.push({

x:Math.random()*canvas.width,
y:-50,
len:Math.random()*80+10,
speed:Math.random()*8+4

});

}


/* ANIMATE */

function animate(){

ctx.fillStyle="#0b111f";
ctx.fillRect(0,0,canvas.width,canvas.height);


/* stars */

ctx.fillStyle="white";

stars.forEach(s=>{

s.y += s.speed;

if(s.y > canvas.height){

s.y = 0;
s.x = Math.random()*canvas.width;

}

ctx.beginPath();
ctx.arc(s.x,s.y,s.size,0,Math.PI*2);
ctx.fill();

});


/* meteors */

ctx.strokeStyle="rgba(0,255,255,0.8)";
ctx.lineWidth=2;

meteors.forEach((m,i)=>{

ctx.beginPath();

ctx.moveTo(m.x,m.y);
ctx.lineTo(m.x-m.len,m.y-m.len);

ctx.stroke();

m.x -= m.speed;
m.y += m.speed;

if(m.y > canvas.height){

meteors.splice(i,1);

}

});


requestAnimationFrame(animate);

}

animate();


/* meteor spawn */

setInterval(function(){

createMeteor();

},1200);

</script>

</body>
</html>
