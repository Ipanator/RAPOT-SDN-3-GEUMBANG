<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Portal Sistem Sekolah</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.container{
text-align:center;
background:#1e293b;
padding:30px;
border-radius:10px;
width:320px;
box-shadow:0 0 10px rgba(0,0,0,0.4);
}

button{
background:#22c55e;
border:none;
padding:10px 20px;
color:white;
font-size:16px;
border-radius:6px;
cursor:pointer;
margin-top:15px;
}

button:hover{
background:#16a34a;
}

.status{
margin:10px 0;
}

.loading{
display:none;
margin-top:20px;
}

.show{
display:block;
}

.spinner{
border:4px solid #ccc;
border-top:4px solid #22c55e;
border-radius:50%;
width:30px;
height:30px;
animation:spin 1s linear infinite;
margin:auto;
}

@keyframes spin{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}

</style>
</head>

<body>

<div class="container">

<h2>Portal Sistem Sekolah</h2>

<div id="time"></div>

<div class="status">
OS : <span id="os"></span>
</div>

<div class="status">
Browser : <span id="browser"></span>
</div>

<div class="status">
Status Server : <span id="serverStatus">Mengecek...</span>
</div>

<button onclick="openSystem()">Lanjutkan ke Sistem</button>

<div class="loading" id="loading">
<div class="spinner"></div>
<div id="loadingText">Menghubungkan ke sistem...</div>
</div>

</div>

<script>

const serverURL="http://10.96.189.165:8535";

function updateTime(){

let now=new Date();

document.getElementById("time").innerHTML=
now.toLocaleTimeString()+"<br>"+now.toLocaleDateString();

}

setInterval(updateTime,1000);

updateTime();



function detectDevice(){

let ua=navigator.userAgent;

let os="Tidak diketahui";
let browser="Tidak diketahui";

if(ua.indexOf("Windows")!=-1) os="Windows";
else if(ua.indexOf("Android")!=-1) os="Android";
else if(ua.indexOf("Linux")!=-1) os="Linux";
else if(ua.indexOf("Mac")!=-1) os="MacOS";

if(ua.indexOf("Chrome")!=-1) browser="Chrome";
else if(ua.indexOf("Firefox")!=-1) browser="Firefox";
else if(ua.indexOf("Safari")!=-1) browser="Safari";
else if(ua.indexOf("Edge")!=-1) browser="Edge";

document.getElementById("os").innerText=os;
document.getElementById("browser").innerText=browser;

}

detectDevice();



function checkServer(){

fetch(serverURL,{mode:'no-cors'})
.then(()=>{
document.getElementById("serverStatus").innerHTML="Online";
})
.catch(()=>{
document.getElementById("serverStatus").innerHTML="Offline";
});

}

checkServer();



function openSystem(){

document.getElementById("loading").classList.add("show");

let countdown=5;

let timer=setInterval(function(){

document.getElementById("loadingText").innerText=
"Menghubungkan ke sistem dalam "+countdown+" detik...";

countdown--;

if(countdown<0){

clearInterval(timer);

window.location.href=serverURL;

}

},1000);

}

</script>

</body>
</html>
