<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Akses Sistem</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
overflow:hidden;
color:white;
}

/* Partikel */
canvas{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:0;
}

/* Card */
.container{
position:relative;
z-index:2;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(12px);
border-radius:15px;
padding:40px;
text-align:center;
width:320px;
box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

.title{
font-size:20px;
margin-bottom:10px;
font-weight:500;
}

.subtitle{
font-size:13px;
opacity:0.8;
margin-bottom:20px;
}

.countdown{
font-size:48px;
font-weight:600;
margin:15px 0;
color:#00ffd5;
}

.info{
font-size:12px;
opacity:0.7;
margin-top:10px;
}

</style>
</head>

<body>

<canvas id="particles"></canvas>

<div class="container">

<div class="title">
Menghubungkan ke Sistem
</div>

<div class="subtitle">
Menyiapkan akses aman...
</div>

<div class="countdown" id="count">
5
</div>

<div class="info">
Memuat halaman sistem
</div>

</div>

<script>

/* COUNTDOWN */

let waktu = 5;

let timer = setInterval(function(){

waktu--;
document.getElementById("count").innerText = waktu;

if(waktu <= 0){

clearInterval(timer);

/* ganti link tujuan di sini */
window.location.href="http://10.96.189.165:8535/";

}

},1000);


/* PARTIKEL */

const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

for(let i=0;i<80;i++){

particles.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
size:Math.random()*3,
speedX:(Math.random()-0.5)*0.5,
speedY:(Math.random()-0.5)*0.5
});

}

function animate(){

ctx.clearRect(0,0,canvas.width,canvas.height);

for(let i=0;i<particles.length;i++){

let p = particles[i];

p.x += p.speedX;
p.y += p.speedY;

if(p.x<0 || p.x>canvas.width) p.speedX *= -1;
if(p.y<0 || p.y>canvas.height) p.speedY *= -1;

ctx.beginPath();
ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
ctx.fillStyle="rgba(0,255,213,0.7)";
ctx.fill();

}

requestAnimationFrame(animate);

}

animate();

</script>

</body>
</html>
