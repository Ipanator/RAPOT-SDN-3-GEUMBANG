<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>E-Raport</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&family=Fira+Code&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}

body{
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
padding:25px;
overflow:hidden;
color:#e2e8f0;
background:linear-gradient(-45deg,#020617,#0f172a,#1e293b,#020617);
background-size:400% 400%;
animation:bgmove 15s ease infinite;
}

@keyframes bgmove{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

.container{
max-width:760px;
width:100%;
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.08);
backdrop-filter:blur(20px);
border-radius:22px;
padding:50px 40px;
text-align:center;
box-shadow:0 20px 50px rgba(0,0,0,0.6), inset 0 0 40px rgba(255,255,255,0.03);
}

/* TERMINAL */

.terminal{
background:#020617;
border:1px solid rgba(56,189,248,0.4);
border-radius:10px;
padding:12px 15px;
width:290px;
margin:0 auto 20px auto;
text-align:left;
font-family:'Fira Code',monospace;
font-size:13px;
color:#38bdf8;
box-shadow:0 0 15px rgba(56,189,248,0.3);
white-space:pre-line;
}

#scanText::after{
content:"|";
animation:blink 1s infinite;
}

@keyframes blink{
0%{opacity:1}
50%{opacity:0}
100%{opacity:1}
}

h1{font-size:28px;margin-bottom:15px;}

p{font-size:15px;line-height:1.8;}

.box-info{
margin-top:25px;
padding:18px;
background:rgba(255,255,255,0.05);
border-radius:12px;
}

.server-status{
margin-top:18px;
font-size:14px;
font-family:'Fira Code',monospace;
}

.button{margin-top:30px;}

.button button{
background:linear-gradient(135deg,#38bdf8,#6366f1);
color:white;
border:none;
padding:14px 35px;
border-radius:10px;
font-size:15px;
cursor:pointer;
transition:0.3s;
box-shadow:0 0 20px rgba(99,102,241,0.4);
}

.button button:hover{
transform:translateY(-2px);
box-shadow:0 0 30px rgba(99,102,241,0.6);
}

.button button:disabled{
background:#475569;
cursor:not-allowed;
box-shadow:none;
}

.footer{
margin-top:25px;
font-size:13px;
opacity:0.6;
}
</style>
</head>

<body>

<div class="container">

<div class="terminal">
<div id="scanText"></div>
</div>

<h1>E-Raport</h1>

<p>
Sistem <b>E-Raport</b> SD Negeri 3 Gelumbang telah dikembangkan berbasis web untuk pengolahan data akademik secara cepat.
</p>

<div class="box-info">
Jika terjadi kendala sistem, silakan berkoordinasi dengan pengembang website SD Negeri 3 Gelumbang.
</div>

<div class="server-status" id="statusServer">
Memeriksa server...
</div>

<div class="button">
<button id="btnMasuk" onclick="openSystem()" disabled>
Menunggu Server...
</button>
</div>

<div class="footer">
SD NEGERI 3 GELUMBANG • Sistem E-Raport Digital
</div>

</div>

<script>

const serverURL="http://10.212.118.165:8535";
let scanBox=document.getElementById("scanText");

function print(text){
scanBox.innerText+=text+"\n";
}

async function cekServer(){

print("> initializing system...");
await sleep(400);

print("> scanning network...");
await sleep(500);

print("> searching server...");
await sleep(600);

fetch(serverURL,{mode:"no-cors"})
.then(()=>{

print("> server detected");
print("> access granted");

document.getElementById("statusServer").innerText="✔ Server Aktif";
document.getElementById("statusServer").style.color="#38bdf8";

let btn=document.getElementById("btnMasuk");
btn.disabled=false;
btn.innerText="Masuk Sistem";

})
.catch(()=>{

print("> server not found");
print("> connection failed");

document.getElementById("statusServer").innerText="Server Tidak Ditemukan";
document.getElementById("statusServer").style.color="#f87171";

});

}

function sleep(ms){
return new Promise(resolve=>setTimeout(resolve,ms));
}

cekServer();

function openSystem(){
window.location.href=serverURL;
}

</script>

</body>
</html>
