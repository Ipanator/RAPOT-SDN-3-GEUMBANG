<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Akses Sistem</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
overflow:hidden;
color:white;
}

/* Canvas meteor */
canvas{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:0;
}

/* Card */
.container{
position:relative;
z-index:2;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(12px);
border-radius:15px;
padding:40px;
text-align:center;
width:320px;
box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

.title{
font-size:20px;
margin-bottom:10px;
font-weight:500;
}

.subtitle{
font-size:13px;
opacity:0.8;
margin-bottom:20px;
}

.countdown{
font-size:48px;
font-weight:600;
margin:15px 0;
color:#00ffd5;
}

.info{
font-size:12px;
opacity:0.7;
margin-top:10px;
}

</style>
</head>

<body>

<canvas id="meteorCanvas"></canvas>

<div class="container">

<div class="title">
Menghubungkan ke Sistem
</div>

<div class="subtitle">
Menyiapkan akses aman...
</div>

<div class="countdown" id="count">
5
</div>

<div class="info">
Memuat halaman sistem
</div>

</div>

<script>

/* COUNTDOWN */

let waktu = 5;

let timer = setInterval(function(){

waktu--;
document.getElementById("count").innerText = waktu;

if(waktu <= 0){

clearInterval(timer);

window.location.href="http://10.96.189.165:8535/";

}

},1000);


/* METEOR EFFECT */

const canvas = document.getElementById("meteorCanvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let meteors = [];

function createMeteor(){

meteors.push({
x:Math.random()*canvas.width,
y:-20,
length:Math.random()*80+20,
speed:Math.random()*6+4,
opacity:Math.random()*0.7+0.3
});

}

function drawMeteor(m){

let gradient = ctx.createLinearGradient(m.x,m.y,m.x,m.y+m.length);

gradient.addColorStop(0,"rgba(255,255,255,"+m.opacity+")");
gradient.addColorStop(1,"rgba(0,255,213,0)");

ctx.strokeStyle = gradient;
ctx.lineWidth = 2;

ctx.beginPath();
ctx.moveTo(m.x,m.y);
ctx.lineTo(m.x,m.y+m.length);
ctx.stroke();

}

function animate(){

ctx.clearRect(0,0,canvas.width,canvas.height);

for(let i=0;i<meteors.length;i++){

let m = meteors[i];

m.y += m.speed;

drawMeteor(m);

if(m.y > canvas.height){
meteors.splice(i,1);
}

}

if(Math.random() < 0.08){
createMeteor();
}

requestAnimationFrame(animate);

}

animate();

</script>

</body>
</html>
