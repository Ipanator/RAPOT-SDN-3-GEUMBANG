<script>

const serverURL="http://10.212.118.165:8535";

/* TERMINAL SCAN */

function updateScan(text){
document.getElementById("scan").innerText=text;
}

/* HUJAN DIGITAL */

function createRain(){

let drop=document.createElement("div");

drop.className="rain";

drop.style.left=Math.random()*window.innerWidth+"px";

let duration=1+Math.random()*1.5;

drop.style.animationDuration=duration+"s";

document.body.appendChild(drop);

setTimeout(()=>{
drop.remove()
},duration*1000);

}

setInterval(createRain,30);

/* DETEKSI OS */

function getOS(){

let ua=navigator.userAgent;

if(ua.indexOf("Android")!=-1) return "Android";
if(ua.indexOf("Windows")!=-1) return "Windows";
if(ua.indexOf("iPhone")!=-1) return "iOS";
if(ua.indexOf("Mac")!=-1) return "MacOS";
if(ua.indexOf("Linux")!=-1) return "Linux";

return "Unknown";

}

/* DETEKSI BROWSER */

function getBrowser(){

let ua=navigator.userAgent;

if(ua.indexOf("Chrome")!=-1) return "Chrome";
if(ua.indexOf("Firefox")!=-1) return "Firefox";
if(ua.indexOf("Safari")!=-1) return "Safari";
if(ua.indexOf("Edge")!=-1) return "Edge";

return "Browser Lain";

}

let os=getOS();
let browser=getBrowser();

/* TEXT BERJALAN */

function updateTime(){

let now=new Date();

let date=now.toLocaleDateString();

let time=now.toLocaleTimeString();

let text="Sistem mendeteksi | Perangkat : "+os+
" | Browser : "+browser+
" | Access Time : "+date+" "+time;

document.getElementById("systemInfo").textContent=text;

}

setInterval(updateTime,3000);
updateTime();

/* CEK SERVER */

function cekServer(){

updateScan("> scanning server...");

fetch(serverURL,{mode:"no-cors"})

.then(()=>{

let btn=document.getElementById("btnMasuk");
let status=document.getElementById("statusServer");

status.innerText="✔ Server Aktif";
status.style.color="#38bdf8";

btn.disabled=false;
btn.innerText="Masuk Sistem";

updateScan("> server online\n> access granted");

})

.catch(()=>{

let btn=document.getElementById("btnMasuk");
let status=document.getElementById("statusServer");

status.innerText="⚠ Server Tidak Ditemukan";
status.style.color="#f87171";

btn.disabled=true;
btn.innerText="Hubungi Developer";

updateScan("> server offline\n> connection failed");

});

}

cekServer();

setInterval(cekServer,1000);

/* PENGUNJUNG HARI INI */

function pengunjungHariIni(){

let now = new Date();
let today = now.toDateString();

/* cek pergantian hari */

let lastDate = localStorage.getItem("visitorDate");

if(lastDate !== today){

localStorage.setItem("visitorDate", today);
localStorage.setItem("visitorCount", 0);

}

/* ambil data */

let jumlah = parseInt(localStorage.getItem("visitorCount") || 0);

/* kenaikan random */

let tambah = Math.floor(Math.random()*3)+1;

/* batas maksimal */

if(jumlah < 900){
jumlah += tambah;
}

/* simpan */

localStorage.setItem("visitorCount", jumlah);

/* tampilkan */

document.getElementById("onlineUser").innerText =
"Pengunjung Hari Ini : "+jumlah+" pengunjung";

/* jeda random 1-3 menit */

let delay = (Math.floor(Math.random()*3)+1) * 60000;

setTimeout(pengunjungHariIni, delay);

}

pengunjungHariIni();

/* OPEN SYSTEM */

function openSystem(){

let loading=document.getElementById("loading");

loading.classList.add("show");

let count=5;

let countdown=document.getElementById("countdown");

let bar=document.getElementById("bar");

let interval=setInterval(()=>{

count--;

countdown.innerText=count;

bar.style.width=((5-count)*20)+"%";

if(count<=0){

clearInterval(interval);

window.location.href=serverURL;

}

},1000);

}

</script>
